name: CI

on:
  push:
    branches: [main]
  pull_request:

# Allow pushing the image to GitHub Container Registry (GHCR).
permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false # no go.sum (stdlib-only app), skip dependency cache
      - name: Vet
        working-directory: app
        run: go vet ./...
      - name: Test
        working-directory: app
        run: go test -race ./...

  lint-charts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint charts/demo-app

  build-and-push:
    needs: [test, lint-charts]
    runs-on: ubuntu-latest
    # Only publish images on pushes to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image name
        # GHCR/OCI repository names must be lowercase; the owner may contain caps.
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gitops-platform-app" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
